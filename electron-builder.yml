appId: com.movieslo.app
productName: Movieslo

directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - package.json

asar: true

win:
  target:
    - target: nsis-web
      arch:
        - x64
  publisherName: Movieslo
  icon: build/icon.ico

nsisWeb:
  oneClick: true
  perMachine: false
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Movieslo

publish:
  provider: github
  owner: 4myo
  repo: movie
  releaseType: release
