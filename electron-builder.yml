appId: com.movieslo.app
productName: Movieslo

directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - package.json

asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
  publisherName: Movieslo
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Movieslo
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  runAfterFinish: true
  differentialPackage: true
  installerHeader: build/icon.ico

publish:
  provider: github
  owner: 4myo
  repo: movie
  releaseType: release
