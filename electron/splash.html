<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 420px;
    height: 270px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    -webkit-user-select: none;
    -webkit-app-region: drag;
    animation: fade-in 200ms ease both;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  .card {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    background:
      linear-gradient(145deg, rgba(255,255,255,0.11) 0%, rgba(255,255,255,0.03) 100%),
      linear-gradient(180deg, rgba(100,50,220,0.2) 0%, rgba(8,5,20,0.98) 100%);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.2),
      0 40px 100px rgba(0,0,0,0.8),
      0 0 0 1px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px 28px;
  }

  .logo {
    width: 62px;
    height: 62px;
    border-radius: 16px;
    background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.18),
      0 8px 28px rgba(124,58,237,0.55),
      inset 0 1px 0 rgba(255,255,255,0.32);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
  }

  .app-name {
    font-size: 21px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.01em;
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 12px;
    color: rgba(255,255,255,0.38);
    margin-bottom: 26px;
  }

  .bar-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 13px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #7c3aed, #a78bfa, #7c3aed);
    background-size: 200% 100%;
    width: 0%;
    animation: bar-run 2s ease forwards, shimmer 1.6s linear infinite;
  }

  @keyframes bar-run {
    0%   { width: 0%; }
    20%  { width: 28%; }
    50%  { width: 60%; }
    80%  { width: 84%; }
    100% { width: 100%; }
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .status {
    font-size: 11.5px;
    color: rgba(255,255,255,0.32);
    letter-spacing: 0.02em;
    transition: opacity 250ms ease;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">M</div>
  <div class="app-name">Movieslo</div>
  <div class="tagline">Your personal movie library</div>
  <div class="bar-track"><div class="bar-fill"></div></div>
  <div class="status" id="status">Preparing app…</div>
</div>
<script>
  const msgs = ['Preparing app…', 'Loading resources…', 'Almost ready…', 'Launching…'];
  const el = document.getElementById('status');
  let i = 0;
  setInterval(() => {
    if (++i >= msgs.length) return;
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = msgs[i]; el.style.opacity = '1'; }, 220);
  }, 550);
</script>
</body>
</html>
